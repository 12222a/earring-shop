name: Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    name: Python Code Quality Check

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort bandit

    - name: Check code formatting with Black
      run: |
        black --check --diff . || true

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff . || true

    - name: Lint with flake8
      run: |
        # 停止构建如果有 Python 语法错误或未定义变量
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --extend-exclude=venv,__pycache__,.git
        # 显示所有错误作为警告
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --extend-exclude=venv,__pycache__,.git || true

    - name: Security check with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . || true

  javascript-lint:
    runs-on: ubuntu-latest
    name: JavaScript Code Quality Check

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-python@v6
      with:
        node-version: '20'

    - name: Install ESLint
      run: |
        npm install -g eslint

    - name: Run ESLint
      run: |
        if [ -f "package.json" ]; then
          npm ci
          npx eslint . --ext .js,.jsx,.ts,.tsx || true
        else
          # 基础检查模式
          eslint . --ext .js || true
        fi
      continue-on-error: true

  shell-check:
    runs-on: ubuntu-latest
    name: Shell Script Check

    steps:
    - uses: actions/checkout@v4

    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Run ShellCheck
      run: |
        find . -type f \( -name "*.sh" -o -name "*.bash" \) -exec shellcheck {} + || true
      continue-on-error: true
